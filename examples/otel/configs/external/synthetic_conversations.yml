# Config for synthetic conversation traces - 100 diverse multi-turn conversations

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    trace_directory: <PATH_TO_OTEL_TRACES>
    
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"
    
    default_max_tokens: 150
    
    include_errors: false
    skip_invalid_files: true

load:
  type: trace_session_replay
  stages:
    - concurrent_sessions: 10  # Run 10 conversations concurrently
      num_sessions: 50         # Process all 100 traces
  num_workers: 20
  worker_max_concurrency: 1000

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-synthetic-conversations"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false

# Generated with generate_synthetic_traces.py
# 100 traces across 9 topics (tech_support, recipe_planning, travel_planning, 
# coding_help, fitness_advice, career_advice, home_improvement, parenting_advice,
# financial_planning, pet_care, learning_language, mental_health)
# Each trace has 5-15 conversation turns with varied content


