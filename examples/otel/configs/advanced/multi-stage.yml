# OTel Trace Replay Configuration - Multi-Stage
# Two stages, each running 1 session from the corpus (2 sessions total in examples/otel/test_traces/simple)

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    trace_directory: "examples/otel/test_traces/simple"
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

    default_max_tokens: 100000

    include_errors: true
    skip_invalid_files: true

load:
  type: trace_session_replay

  stages:
    - concurrent_sessions: 1
      num_sessions: 1   # Stage 0: first session from corpus
    - concurrent_sessions: 1
      num_sessions: 1   # Stage 1: second session from corpus

  num_workers: 3
  worker_max_concurrency: 10

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-otel-trace-replay-multi-stage"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false
