load:
  type: concurrent
  stages:
  - num_requests: 20
    concurrency_level: 2
  - num_requests: 20
    concurrency_level: 4
  - num_requests: 20
    concurrency_level: 6
  - num_requests: 20
    concurrency_level: 8
  - num_requests: 20
    concurrency_level: 10
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: conversation_replay
  conversation_replay:
    seed: 42
    num_conversations: 10
    shared_system_prompt_len: 250
    turns_per_conversation:
      type: fixed
      mean: 1
    input_tokens_per_turn:
      type: lognormal
      min: 100
      max: 5000
      mean: 1000
      std_dev: 800
    output_tokens_per_turn:
      type: lognormal
      min: 500
      max: 32000
      mean: 8000
      std_dev: 6500
