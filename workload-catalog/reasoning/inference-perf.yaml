load:
  type: concurrent
  stages:
  - num_requests: 8
    concurrency_level: 2
  - num_requests: 16
    concurrency_level: 4
  - num_requests: 24
    concurrency_level: 6
  - num_requests: 32
    concurrency_level: 8
  - num_requests: 40
    concurrency_level: 10
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: shared_prefix
  shared_prefix:
    num_groups: 10
    num_prompts_per_group: 1
    enable_multi_turn_chat: false
    system_prompt_len:
      min: 250
      max: 250
      mean: 250.0
      std_dev: 0.0
      type: normal
    question_len:
      min: 100
      max: 5000
      mean: 1000.0
      std_dev: 800.0
      type: lognormal
    output_len:
      min: 500
      max: 32000
      mean: 8000.0
      std_dev: 6500.0
      type: lognormal
