load:
  type: concurrent
  stages:
  - num_requests: 120
    concurrency_level: 4
  - num_requests: 120
    concurrency_level: 8
  - num_requests: 120
    concurrency_level: 12
  - num_requests: 120
    concurrency_level: 16
  - num_requests: 120
    concurrency_level: 20
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: conversation_replay
  conversation_replay:
    seed: 42
    num_conversations: 20
    shared_system_prompt_len: 3000
    dynamic_system_prompt_len:
      type: uniform
      min: 15000
      max: 120000
      mean: 55000
      std_dev: 25000
    turns_per_conversation:
      type: normal
      min: 2
      max: 20
      mean: 6
      std_dev: 3.5
    input_tokens_per_turn:
      type: lognormal
      min: 100
      max: 10000
      mean: 1500
      std_dev: 1200
    output_tokens_per_turn:
      type: lognormal
      min: 50
      max: 4000
      mean: 800
      std_dev: 600
    tool_call_latency_sec:
      type: lognormal
      min: 15
      max: 120
      mean: 45
      std_dev: 25
