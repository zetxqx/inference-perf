load:
  type: concurrent
  stages:
  - num_requests: 64
    concurrency_level: 8
  - num_requests: 128
    concurrency_level: 16
  - num_requests: 192
    concurrency_level: 24
  - num_requests: 256
    concurrency_level: 32
  - num_requests: 320
    concurrency_level: 40
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: shared_prefix
  shared_prefix:
    num_groups: 10
    num_prompts_per_group: 1
    enable_multi_turn_chat: false
    system_prompt_len:
      min: 2000
      max: 2000
      mean: 2000.0
      std_dev: 0.0
      type: normal
    question_len:
      min: 50
      max: 15000
      mean: 500.0
      std_dev: 1200.0
      type: lognormal
    output_len:
      min: 500
      max: 8000
      mean: 4000.0
      std_dev: 2500.0
      type: uniform
