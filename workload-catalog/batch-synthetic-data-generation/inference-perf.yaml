load:
  type: concurrent
  stages:
  - num_requests: 160
    concurrency_level: 8
  - num_requests: 160
    concurrency_level: 16
  - num_requests: 160
    concurrency_level: 24
  - num_requests: 160
    concurrency_level: 32
  - num_requests: 160
    concurrency_level: 40
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: conversation_replay
  conversation_replay:
    seed: 42
    num_conversations: 40
    shared_system_prompt_len: 2000
    turns_per_conversation:
      type: fixed
      mean: 1
    input_tokens_per_turn:
      type: lognormal
      min: 50
      max: 15000
      mean: 500
      std_dev: 1200
    output_tokens_per_turn:
      type: uniform
      min: 500
      max: 8000
      mean: 4000
      std_dev: 2500
