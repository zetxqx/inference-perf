load:
  type: concurrent
  stages:
  - num_requests: 15
    concurrency_level: 1
  - num_requests: 30
    concurrency_level: 2
  - num_requests: 45
    concurrency_level: 3
  - num_requests: 60
    concurrency_level: 4
  - num_requests: 75
    concurrency_level: 5
  num_workers: 1
api:
  type: chat
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: shared_prefix
  shared_prefix:
    num_groups: 10
    num_prompts_per_group: 15
    enable_multi_turn_chat: true
    system_prompt_len:
      min: 2000
      max: 2000
      mean: 2000.0
      std_dev: 0.0
      type: normal
    question_len:
      min: 500
      max: 15000
      mean: 3000.0
      std_dev: 2500.0
      type: lognormal
    output_len:
      min: 50
      max: 4000
      mean: 300.0
      std_dev: 850.0
      type: normal
